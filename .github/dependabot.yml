# Keep CI actions on a tight leash: SHA-pinned via auto-PR.
# CSO finding #4 (0.6.6 audit) — `actions/*` and
# `pypa/gh-action-pypi-publish` were on mutable tags (`@v5` / `@release/v1`),
# vulnerable to upstream tag-poisoning supply-chain attacks
# (cf. tj-actions/changed-files, March 2025).
# Dependabot pins to SHA on every update so a compromised tag move
# never auto-flows into our publish workflow.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
