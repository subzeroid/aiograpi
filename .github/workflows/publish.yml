name: Publish to PyPI

# Triggered by pushing a version tag (e.g. 0.2.0, 1.0.0).
# Builds sdist + wheel, publishes to PyPI via trusted publishing
# (no API tokens required), and creates a GitHub release with the
# built artifacts attached.
#
# Setup (one-time, on PyPI):
#   1. https://pypi.org/manage/project/aiograpi/settings/publishing/
#   2. Add a new pending publisher:
#        Owner: subzeroid
#        Repository name: aiograpi
#        Workflow name: publish.yml
#        Environment name: pypi
#   3. After the first successful run, the publisher is no longer pending.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+b[0-9]+"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Verify tag matches pyproject.toml version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Avoid tomllib (Python 3.11+) and tomli (extra dep) — just
          # grep the version line. pyproject.toml's [project].version
          # is on its own line in our file.
          VERSION=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $VERSION"
            exit 1
          fi
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aiograpi/${{ github.ref_name }}/
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      # Pinned to commit SHA (v1.14.0) — moving refs like
      # release/v1 are a supply-chain risk: an upstream takeover
      # could swap them to malicious code that runs with the
      # id-token: write permission this job grants.
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            "dist/aiograpi-$TAG-py3-none-any.whl" \
            "dist/aiograpi-$TAG.tar.gz" \
            --title "$TAG" \
            --generate-notes
