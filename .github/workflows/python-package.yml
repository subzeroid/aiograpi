# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Package

on:
  push:
    branches: [ "main" ]
  pull_request: {}

env:
  PYTHON_VERSION: "3.10.13"

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          test-requirements: "true"

      - name: Run bandit
        run: bandit --ini .bandit -r aiograpi

  flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          test-requirements: "true"

      - name: Run flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --statistics
  isort:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"

      - name: Run isort
        run: isort --check-only aiograpi

  mypy:
    # Mypy regression gate. Counts errors against .mypy-baseline and fails
    # if the count goes up. Strict-pass is years away (legacy upstream port
    # has 1000+ untyped functions); this just stops the bleeding.
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"
      - name: Run mypy regression gate
        run: ./scripts/check-mypy-baseline.sh

  unit-test:
    # Network-free regression tests. Runs on every push/PR. No
    # secrets needed — purely tests parsing, mocking, and plumbing.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"
      - name: Run regression tests
        # ~107 tests across all RegressionTestCase classes + a few
        # related ones. ~10 are individually @unittest.skip-ped with
        # documented reasons (urllib3-only, requires live network).
        run: |
          pytest -sv \
            tests.py::ExtractorsRegressionTestCase \
            tests.py::DirectExtractorRegressionTestCase \
            tests.py::PublicRegressionTestCase \
            tests.py::PolarisProfileNormalizationTestCase \
            tests.py::CaptchaHandlerMixinRegressionTestCase \
            tests.py::NoteMixinRegressionTestCase \
            tests.py::LocationMixinRegressionTestCase \
            tests.py::ChallengeRegressionTestCase \
            tests.py::AuthAndStoryRegressionTestCase \
            tests.py::ClientTestCase \
            tests.py::DownloadRegressionTestCase \
            tests.py::DirectMixinRegressionTestCase \
            tests.py::UserMixinRegressionTestCase \
            tests.py::TimelineRegressionTestCase \
            tests.py::StoryConfigureRegressionTestCase \
            tests.py::UploadRegressionTestCase \
            tests.py::SignUpTestCase \
            tests.py::ChapiPortedRegressionTestCase

  live-test:
    # Live IG tests via pooled accounts. Only on canonical-repo pushes
    # — PRs from forks don't have access to the TEST_ACCOUNTS_URL secret.
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository == 'subzeroid/aiograpi'
    strategy:
      matrix:
        python-version: [ "3.10" ]
    env:
      TEST_ACCOUNTS_URL: ${{ secrets.TEST_ACCOUNTS_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"
      - name: Run end-to-end smoke
        # Required: anonymous public_gql + login(TOTP) + private_v1 +
        # private_v2_gql + hashtag_info_v1 + user_medias_v1 +
        # user_followers + highlight_info.
        # Optional (reports but never fails): all chapi-ported endpoints.
        # PYTHONPATH=. so `from aiograpi import Client` resolves without
        # `pip install -e .` (install-dependencies action installs deps
        # only, not the package itself).
        #
        # Note: pytest classes ClientMediaTestCase / ClientUserTestCase /
        # ClientHighlightTestCase are intentionally not run here — they
        # require ACCOUNT_USERNAME/PASSWORD env vars (not provided by the
        # HikerAPI pool). Pure helpers (media_pk, media_pk_from_code,
        # media_code_from_pk, media_id, highlight_pk_from_url) are covered
        # by the unit-test job; user_followers and highlight_info are
        # covered by the smoke above.
        run: PYTHONPATH=. python tests/live/smoke.py

  build-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"

      - name: Build Docs
        run: mkdocs build --strict

      # upload artifact for dev build
      - name: Upload coverage results artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: site/

  update-dev-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"

      - name: Push documentaiton changes
        uses: ./.github/actions/publish-docs-with-mike
        with:
          version_name: dev
