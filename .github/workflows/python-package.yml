# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Package

on:
  push:
    branches: [ "main" ]
  pull_request: {}

env:
  PYTHON_VERSION: "3.10.13"

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          test-requirements: "true"

      - name: Run bandit
        run: bandit --ini .bandit -r aiograpi

  flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          test-requirements: "true"

      - name: Run flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --statistics
  isort:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"

      - name: Run isort
        run: isort --check-only aiograpi

  unit-test:
    # Network-free regression tests. Runs on every push/PR. No
    # secrets needed — purely tests parsing, mocking, and plumbing.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"
      - name: Run regression tests
        # ~107 tests across all RegressionTestCase classes + a few
        # related ones. ~10 are individually @unittest.skip-ped with
        # documented reasons (urllib3-only, requires live network).
        run: |
          pytest -sv \
            tests.py::ExtractorsRegressionTestCase \
            tests.py::DirectExtractorRegressionTestCase \
            tests.py::PublicRegressionTestCase \
            tests.py::PolarisProfileNormalizationTestCase \
            tests.py::CaptchaHandlerMixinRegressionTestCase \
            tests.py::NoteMixinRegressionTestCase \
            tests.py::LocationMixinRegressionTestCase \
            tests.py::ChallengeRegressionTestCase \
            tests.py::AuthAndStoryRegressionTestCase \
            tests.py::ClientTestCase \
            tests.py::DownloadRegressionTestCase \
            tests.py::DirectMixinRegressionTestCase \
            tests.py::UserMixinRegressionTestCase \
            tests.py::TimelineRegressionTestCase \
            tests.py::StoryConfigureRegressionTestCase \
            tests.py::UploadRegressionTestCase \
            tests.py::SignUpTestCase \
            tests.py::ChapiPortedRegressionTestCase

  live-test:
    # Live IG tests via pooled accounts. Only on canonical-repo pushes
    # — PRs from forks don't have access to the TEST_ACCOUNTS_URL secret.
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository == 'subzeroid/aiograpi'
    strategy:
      matrix:
        python-version: [ "3.10" ]
    env:
      TEST_ACCOUNTS_URL: ${{ secrets.TEST_ACCOUNTS_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"
      - name: Run media test
        run: pytest -sv tests.py::ClientMediaTestCase
      - name: Run user test
        run: pytest -sv tests.py::ClientUserTestCase
      - name: Run highlight test
        run: pytest -sv tests.py::ClientHighlightTestCase

  build-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"

      - name: Build Docs
        run: mkdocs build --strict

      # upload artifact for dev build
      - name: Upload coverage results artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: docs-site
          path: site/

  update-dev-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          requirements: "true"
          test-requirements: "true"

      - name: Push documentaiton changes
        uses: ./.github/actions/publish-docs-with-mike
        with:
          version_name: dev
